<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFHL Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2.5em;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-clear {
      background: #f0f0f0;
      color: #333;
    }

    .btn-clear:hover {
      background: #e0e0e0;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #ff6b6b;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .success {
      background: #51cf66;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .results {
      display: none;
    }

    .result-section {
      margin-bottom: 30px;
    }

    .result-section h3 {
      color: #667eea;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }

    .user-info {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .user-info p {
      margin: 8px 0;
      color: #555;
    }

    .user-info strong {
      color: #333;
    }

    .hierarchies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .hierarchy-card {
      background: #f8f9ff;
      border: 2px solid #667eea;
      border-radius: 8px;
      padding: 15px;
    }

    .hierarchy-card h4 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .tree-display {
      background: white;
      padding: 10px;
      border-radius: 5px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .cycle-badge {
      display: inline-block;
      background: #ff6b6b;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      margin-left: 10px;
    }

    .summary-box {
      background: #f8f9ff;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .summary-box p {
      margin: 10px 0;
      color: #555;
    }

    .invalid-list, .duplicate-list {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .invalid-list h4, .duplicate-list h4 {
      color: #856404;
      margin-bottom: 10px;
    }

    .list-item {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #333;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌳 BFHL Hierarchy Processor</h1>

    <div class="main-grid">
      <!-- Input Section -->
      <div class="card">
        <h2>Input</h2>
        <p style="color: #666; margin-bottom: 15px; font-size: 14px;">Enter node relationships in the format: A->B</p>
        <textarea id="input" placeholder="Example:&#10;A->B&#10;A->C&#10;B->D&#10;X->Y&#10;Y->X"></textarea>
        <div class="button-group">
          <button class="btn-submit" onclick="submitData()">Submit</button>
          <button class="btn-clear" onclick="clearInput()">Clear</button>
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p style="margin-top: 10px; color: #667eea;">Processing...</p>
        </div>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
      </div>

      <!-- Results Section (Summary) -->
      <div class="card">
        <h2>Summary</h2>
        <div class="results" id="summary-results">
          <div class="summary-box">
            <p><strong>Total Trees:</strong> <span id="totalTrees">-</span></p>
            <p><strong>Total Cycles:</strong> <span id="totalCycles">-</span></p>
            <p><strong>Largest Tree Root:</strong> <span id="largestRoot">-</span></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Full Results Section -->
    <div class="card results" id="full-results">
      <h2>Detailed Results</h2>

      <!-- User Info -->
      <div class="result-section">
        <h3>User Information</h3>
        <div class="user-info">
          <p><strong>User ID:</strong> <span id="userId">-</span></p>
          <p><strong>Email:</strong> <span id="userEmail">-</span></p>
          <p><strong>College Roll:</strong> <span id="userRoll">-</span></p>
        </div>
      </div>

      <!-- Hierarchies -->
      <div class="result-section">
        <h3>Hierarchies</h3>
        <div class="hierarchies-grid" id="hierarchies"></div>
      </div>

      <!-- Invalid Entries -->
      <div class="result-section" id="invalid-section" style="display: none;">
        <h3>Invalid Entries</h3>
        <div class="invalid-list" id="invalidList"></div>
      </div>

      <!-- Duplicate Edges -->
      <div class="result-section" id="duplicate-section" style="display: none;">
        <h3>Duplicate Edges</h3>
        <div class="duplicate-list" id="duplicateList"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/bfhl';

    function parseInput() {
      const input = document.getElementById('input').value;
      const lines = input.split('\n').map(line => line.trim()).filter(line => line);
      return lines;
    }

    async function submitData() {
      const data = parseInput();

      if (data.length === 0) {
        showError('Please enter at least one node relationship');
        return;
      }

      showLoading(true);
      hideError();
      hideSuccess();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ data })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        displayResults(result);
        showSuccess('Data processed successfully!');
      } catch (error) {
        console.error('Error:', error);
        showError(`Failed to process data: ${error.message}`);
      } finally {
        showLoading(false);
      }
    }

    function displayResults(data) {
      // Display user info
      document.getElementById('userId').textContent = data.user_id;
      document.getElementById('userEmail').textContent = data.email_id;
      document.getElementById('userRoll').textContent = data.college_roll_number;

      // Display summary
      document.getElementById('totalTrees').textContent = data.summary.total_trees;
      document.getElementById('totalCycles').textContent = data.summary.total_cycles;
      document.getElementById('largestRoot').textContent = data.summary.largest_tree_root || 'N/A';

      // Display hierarchies
      const hierarchiesDiv = document.getElementById('hierarchies');
      hierarchiesDiv.innerHTML = '';

      data.hierarchies.forEach(h => {
        const card = document.createElement('div');
        card.className = 'hierarchy-card';

        let content = `<h4>Root: ${h.root}`;
        if (h.has_cycle) {
          content += ' <span class="cycle-badge">CYCLE</span>';
        }
        content += '</h4>';

        if (h.has_cycle) {
          content += '<p><em>This hierarchy contains a cycle</em></p>';
        } else {
          content += `<p><strong>Depth:</strong> ${h.depth}</p>`;
          content += '<p><strong>Structure:</strong></p>';
          content += '<div class="tree-display">' + JSON.stringify(h.tree, null, 2) + '</div>';
        }

        card.innerHTML = content;
        hierarchiesDiv.appendChild(card);
      });

      // Display invalid entries
      if (data.invalid_entries.length > 0) {
        const invalidSection = document.getElementById('invalid-section');
        const invalidList = document.getElementById('invalidList');
        invalidSection.style.display = 'block';
        invalidList.innerHTML = data.invalid_entries
          .map(item => `<div class="list-item">${item}</div>`)
          .join('');
      } else {
        document.getElementById('invalid-section').style.display = 'none';
      }

      // Display duplicate edges
      if (data.duplicate_edges.length > 0) {
        const duplicateSection = document.getElementById('duplicate-section');
        const duplicateList = document.getElementById('duplicateList');
        duplicateSection.style.display = 'block';
        duplicateList.innerHTML = data.duplicate_edges
          .map(item => `<div class="list-item">${item}</div>`)
          .join('');
      } else {
        document.getElementById('duplicate-section').style.display = 'none';
      }

      // Show results
      document.getElementById('full-results').style.display = 'block';
      document.getElementById('summary-results').style.display = 'block';
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('success');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      setTimeout(() => {
        successDiv.style.display = 'none';
      }, 3000);
    }

    function hideSuccess() {
      document.getElementById('success').style.display = 'none';
    }

    function clearInput() {
      document.getElementById('input').value = '';
      document.getElementById('full-results').style.display = 'none';
      document.getElementById('summary-results').style.display = 'none';
      hideError();
      hideSuccess();
    }

    // Allow Enter key to submit
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('input').addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          submitData();
        }
      });
    });
  </script>
</body>
</html>
